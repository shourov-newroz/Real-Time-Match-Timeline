services:
  - type: web
    name: rtmt-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGINS
        sync: false
